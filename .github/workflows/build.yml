name: Build APKs
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Select build mode'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - dev
      patch_source:
        description: 'Select patch source'
        required: true
        default: 'morphe'
        type: choice
        options:
          - morphe
          - piko

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Set matrix based on patch source
        id: set-matrix
        run: |
          matrix="$(uv run main.py get-matrix "${{ inputs.patch_source }}")"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  run:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Install java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build APKs
        run: uv run main.py ${{ matrix.id }} ${{ matrix.arch }}
        env:
          BUILD_MODE: ${{ inputs.build_mode }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}

      - name: Upload APKs as artifact
        uses: actions/upload-artifact@v7
        with:
          name: apks-${{ matrix.id }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: ./build/*.apk
          if-no-files-found: warn
          retention-days: 1

      - name: Upload build log as artifact
        uses: actions/upload-artifact@v7
        with:
          name: log-${{ matrix.id }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
          path: build.md
          if-no-files-found: warn
          retention-days: 1

  release:
    needs: run
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check if any artifacts exist
        id: check_artifacts
        continue-on-error: true
        run: |
          if gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq '.artifacts[] | select(.name | startswith("apks-")) | .name' | grep -q .; then
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare version
        if: steps.check_artifacts.outputs.has_artifacts == 'true'
        id: version
        run: |
          VER="$(date +%y.%m.%d)"
          [[ "${{ inputs.build_mode }}" == "dev" ]] && VER="${VER}-pre"
          VER="${VER}-${{ inputs.patch_source }}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Download all APKs
        if: steps.check_artifacts.outputs.has_artifacts == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: apks-*
          path: all-apks
          merge-multiple: true

      - name: Download all logs
        if: steps.check_artifacts.outputs.has_artifacts == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: log-*
          path: logs

      - name: Combine logs
        if: steps.check_artifacts.outputs.has_artifacts == 'true'
        id: get_output
        run: |
          DELIM="$(openssl rand -hex 8)"
          echo "BUILD_LOG<<${DELIM}" >> "$GITHUB_OUTPUT"
          uv run main.py combine-logs logs >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Upload release
        if: steps.check_artifacts.outputs.has_artifacts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.version }}
          BODY: ${{ steps.get_output.outputs.BUILD_LOG }}
          IS_PRERELEASE: ${{ inputs.build_mode == 'dev' }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" == "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes "$BODY" $PRERELEASE_FLAG
            gh release upload "$TAG" all-apks/*.apk --clobber
          else
            gh release create "$TAG" all-apks/*.apk --title "$TAG" --notes "$BODY" $PRERELEASE_FLAG
          fi